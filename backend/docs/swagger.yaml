basePath: /api
definitions:
  domain.AddParticipantsRequest:
    properties:
      user_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - user_ids
    type: object
  domain.Chat:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      creator_id:
        type: string
      id:
        type: string
      last_message_at:
        type: string
      name:
        type: string
      type:
        $ref: '#/definitions/domain.ChatType'
      updated_at:
        type: string
    type: object
  domain.ChatResponse:
    properties:
      avatar_url:
        type: string
      creator_id:
        type: string
      id:
        type: string
      last_message:
        $ref: '#/definitions/domain.MessageInfo'
      last_message_at:
        type: string
      name:
        type: string
      type:
        $ref: '#/definitions/domain.ChatType'
      unread_count:
        type: integer
      updated_at:
        type: string
    type: object
  domain.ChatType:
    enum:
    - private
    - group
    type: string
    x-enum-varnames:
    - ChatTypePrivate
    - ChatTypeGroup
  domain.CreateGroupChatRequest:
    properties:
      avatar_url:
        type: string
      name:
        type: string
      user_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - name
    - user_ids
    type: object
  domain.CreatePrivateChatRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  domain.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  domain.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  domain.Message:
    properties:
      chat_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      is_edited:
        type: boolean
      reply_to:
        type: string
      text:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  domain.MessageInfo:
    properties:
      created_at:
        type: string
      id:
        type: string
      text:
        type: string
      user_id:
        type: string
    type: object
  domain.Participant:
    properties:
      chat_id:
        type: string
      id:
        type: string
      joined_at:
        type: string
      last_read_at:
        type: string
      role:
        description: admin, member
        type: string
      user_id:
        type: string
    type: object
  domain.SendMessageRequest:
    properties:
      reply_to:
        type: string
      text:
        type: string
    required:
    - text
    type: object
  domain.UpdateChatRequest:
    properties:
      avatar_url:
        type: string
      name:
        type: string
    type: object
  domain.UpdateRoleRequest:
    properties:
      role:
        enum:
        - admin
        - member
        type: string
      user_id:
        type: string
    required:
    - role
    - user_id
    type: object
  domain.UpdateUserRequest:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
  domain.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      last_seen:
        type: string
      status:
        description: online, offline, away
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
host: backend-1-8qiq.onrender.com
info:
